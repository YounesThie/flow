function saveModal(){
  const m=state.modal;if(!m)return;
  const gN=()=>document.getElementById('f-name')?.value.trim()||'';
  const gA=()=>parseFloat(document.getElementById('f-amount')?.value)||0;
  const gC=()=>document.getElementById('f-cat')?.value||'other';
  const gD=()=>document.getElementById('f-date')?.value||tstr();
  if(m.type==='income'){const mo=gm(state.month);if(m.mode==='add'){if(!gN()||gA()<=0)return;mo.income.push({id:uid(),name:gN(),amount:gA(),category:gC(),date:gD()});}else{const it=mo.income.find(i=>i.id===m.editId);if(it){it.name=gN();it.amount=gA();it.category=gC();it.date=gD();}}}
  else if(m.type==='income-tmpl'){if(!data.incomeTemplates)data.incomeTemplates=[];if(m.mode==='add'){if(!gN()||gA()<=0)return;data.incomeTemplates.push({id:uid(),name:gN(),amount:gA(),category:gC()});}else{const t=data.incomeTemplates.find(t=>t.id===m.editId);if(t){t.name=gN();t.amount=gA();t.category=gC();}}}
  else if(m.type==='variable'){const gNotes=()=>document.getElementById('f-notes')?.value.trim()||'';const mo=gm(state.month);if(m.mode==='add'){if(!gN()||gA()<=0)return;mo.variable.push({id:uid(),name:gN(),amount:gA(),category:gC(),date:gD(),notes:gNotes()});}else{const it=mo.variable.find(i=>i.id===m.editId);if(it){it.name=gN();it.amount=gA();it.category=gC();it.date=gD();it.notes=gNotes();}}}
  else if(m.type==='fixed'){if(m.mode==='add'){if(!gN()||gA()<=0)return;data.templates.push({id:uid(),name:gN(),amount:gA(),category:gC()});}else{const t=data.templates.find(t=>t.id===m.editId);if(t){t.name=gN();t.amount=gA();t.category=gC();}}}
  else if(m.type==='budget'){if(!data.settings.budgets)data.settings.budgets={};const amt=parseFloat(document.getElementById('f-amount')?.value)||0;if(amt>0)data.settings.budgets[m.editId]=amt;else delete data.settings.budgets[m.editId];}
  else if(m.type==='settings'){data.settings.currency=document.getElementById('f-currency')?.value.trim()||'€';data.settings.goal=parseFloat(document.getElementById('f-goal')?.value)||500;if(!data.settings.budgets)data.settings.budgets={};}
  save();closeModal();render();
}
function deleteModal(){
  const m=state.modal;if(!m||m.mode!=='edit')return;const k=state.month;
  if(m.type==='income')gm(k).income=gm(k).income.filter(i=>i.id!==m.editId);
  else if(m.type==='income-tmpl')data.incomeTemplates=(data.incomeTemplates||[]).filter(t=>t.id!==m.editId);
  else if(m.type==='variable')gm(k).variable=gm(k).variable.filter(i=>i.id!==m.editId);
  else if(m.type==='fixed')data.templates=data.templates.filter(t=>t.id!==m.editId);
  else if(m.type==='budget'){if(data.settings.budgets)delete data.settings.budgets[m.editId];}
  save();closeModal();render();
}
function toggleFixed(id){const mo=gm(state.month);if(!mo.inactive)mo.inactive=[];const idx=mo.inactive.indexOf(id);idx===-1?mo.inactive.push(id):mo.inactive.splice(idx,1);save();render();}
function toggleIncomeFixed(id){const mo=gm(state.month);if(!mo.inactiveIncome)mo.inactiveIncome=[];const idx=mo.inactiveIncome.indexOf(id);idx===-1?mo.inactiveIncome.push(id):mo.inactiveIncome.splice(idx,1);save();render();}

function attachListeners(){
  document.getElementById('main').addEventListener('click',e=>{
    const t=e.target.closest('[data-action]');if(!t)return;
    const{action,id}=t.dataset;
    if(action==='add-income')openAddIncome();
    else if(action==='add-income-tmpl')openAddIncomeTmpl();
    else if(action==='add-income-unified')openAddIncomeUnified();
    else if(action==='income-seg'){state.incomeSegment=id;render();}
    else if(action==='trends-select'){state.trendsSelected=state.trendsSelected===id?null:id;render();}
    else if(action==='add-variable')openAddVar();
    else if(action==='add-fixed')openAddFixed();
    else if(action==='edit-income')openEditIncome(id);
    else if(action==='edit-income-tmpl')openEditIncomeTmpl(id);
    else if(action==='edit-variable')openEditVar(id);
    else if(action==='edit-fixed')openEditFixed(id);
    else if(action==='toggle-fixed'){e.stopPropagation();toggleFixed(id);}
    else if(action==='toggle-income'){e.stopPropagation();toggleIncomeFixed(id);}
    else if(action==='set-budget')openSetBudget(id);
    else if(action==='open-cat-detail')openCatDetail(id);
    else if(action==='open-summary')openSummary(id);
    else if(action==='export-csv')exportCSV();
  });
}

function exportCSV(){
  const rows=[['Type','Name','Amount','Category','Date','Notes']];
  const months=Object.keys(data.months).sort();
  months.forEach(k=>{
    const m=data.months[k];
    const ia=m.inactive||[],iia=m.inactiveIncome||[];
    (data.incomeTemplates||[]).filter(t=>!iia.includes(t.id)).forEach(t=>rows.push(['Recurring Income',t.name,t.amount,gc(t.id,'income')?.l||t.category,k,'']));
    (m.income||[]).forEach(i=>rows.push(['One-time Income',i.name,i.amount,gc(i.category,'income')?.l||i.category,i.date||k,'']));
    data.templates.filter(t=>!ia.includes(t.id)).forEach(t=>rows.push(['Fixed Expense',t.name,-t.amount,gc(t.category,'expense')?.l||t.category,k,'']));
    (m.variable||[]).forEach(i=>rows.push(['Variable Expense',i.name,-i.amount,gc(i.category,'expense')?.l||i.category,i.date||k,i.notes||'']));
  });
  const lines=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv=lines.join('\r\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='flow-budget.csv';
  a.click();
  closeModal();
}


// ─── ONBOARDING ─────────────────────────────────────────────────────────────
const OB_KEY = 'flow_ob_done';
const OB_CURRENCIES = [
  {sym:'€',code:'EUR',label:'Euro'},
  {sym:'$',code:'USD',label:'Dollar'},
  {sym:'£',code:'GBP',label:'Pound'},
  {sym:'CHF',code:'CHF',label:'Swiss Franc'},
  {sym:'kr',code:'SEK',label:'Krona'},
  {sym:'¥',code:'JPY',label:'Yen'},
];
const OB_STEPS = ['welcome','currency','income','fixed','goal','done'];
let obStep = 0;

function obDone(){ return !!localStorage.getItem(OB_KEY); }

function obFinish(){
  localStorage.setItem(OB_KEY,'1');
  const el = document.getElementById('onboarding');
  el.classList.add('done');
  document.getElementById('app').style.display='flex';
  render();
  setTimeout(()=>{ el.style.display='none'; }, 420);
}

function obGo(step){
  obStep = Math.max(0, Math.min(OB_STEPS.length-1, step));
  obRender();
}

function obRender(){
  const total = OB_STEPS.length;
  const s = OB_STEPS[obStep];

  // Progress dots
  document.getElementById('ob-progress').innerHTML =
    OB_STEPS.map((_,i)=>`<div class="ob-dot${i===obStep?' active':i<obStep?' done-dot':''}"></div>`).join('');

  // Pages — slide all pages, show only current
  const pages = document.getElementById('ob-pages');
  pages.innerHTML = `<div class="ob-page" id="ob-page">${obPageHtml(s)}</div>`;

  // Footer
  const footer = document.getElementById('ob-footer');
  if(s === 'welcome'){
    footer.innerHTML = `<button class="ob-cta" id="ob-next">Get started</button>`;
  } else if(s === 'done'){
    footer.innerHTML = `<button class="ob-cta" id="ob-next">Open FLOW</button>`;
  } else {
    const nextLabel = s==='goal' ? 'Finish setup' : 'Continue';
    footer.innerHTML = `
      <button class="ob-cta" id="ob-next">${nextLabel}</button>
      <button class="ob-skip" id="ob-skip">Skip</button>`;
  }

  // Animate in
  const page = document.getElementById('ob-page');
  page.style.transform = 'translateX(30px)';
  page.style.opacity = '0';
  requestAnimationFrame(()=>{
    page.style.transition = 'transform .32s cubic-bezier(.34,1.56,.64,1), opacity .24s ease';
    page.style.transform = 'translateX(0)';
    page.style.opacity = '1';
  });

  // Wire buttons
  document.getElementById('ob-next')?.addEventListener('click', obNext);
  document.getElementById('ob-skip')?.addEventListener('click', obSkip);

  // Step-specific listeners
  if(s === 'currency') obWireCurrency();
  if(s === 'income')   obWireIncome();
  if(s === 'fixed')    obWireFixed();
  if(s === 'goal')     obWireGoal();
}

function obPageHtml(s){
  switch(s){
    case 'welcome': return obWelcomePage();
    case 'currency': return obCurrencyPage();
    case 'income': return obIncomePage();
    case 'fixed': return obFixedPage();
    case 'goal': return obGoalPage();
    case 'done': return obDonePage();
  }
  return '';
}

    const cat=gc(t.category,'expense');
    return`<div class="ob-list-item">
      <div class="ob-list-icon" style="background:${cat.c}">${cat.e}</div>
      <div class="ob-list-info"><div class="ob-list-name">${esc(t.name)}</div><div class="ob-list-sub">${cat.l} · recurring</div></div>
      <div class="ob-list-amt">-${fmt(t.amount)}</div>
    </div>`;}).join('');
  return`<div style="flex:1;display:flex;flex-direction:column">
    <div class="ob-step-hdr">
      <div class="ob-step-eyebrow">Step 3 of 4</div>
      <div class="ob-step-title">Add your fixed<br>monthly costs</div>
      <div class="ob-step-sub">Rent, subscriptions, insurance — anything that repeats every month.</div>
    </div>
    ${templates.length>0?`<div class="ob-list">${items}</div>
      <div class="ob-total-row"><span class="ob-total-label">Total fixed costs</span><span class="ob-total-val">-${fmt(total)}</span></div>
      ${inc>0?`<div style="font-size:13px;color:var(--t3);padding:4px 2px 8px">${fmt(remaining)} left after fixed costs (~${fmt(remaining/30)}/day)</div>`:''}`:''}
    <button class="ob-add-btn" id="ob-add-fixed">＋ Add fixed expense</button>
  </div>`;
}

function obWireFixed(){
  document.getElementById('ob-add-fixed')?.addEventListener('click',()=>{
    openAddFixed();
    document.getElementById('modal-save').addEventListener('click',()=>{ setTimeout(()=>{ if(OB_STEPS[obStep]==='fixed') obRender(); },50); },{once:true});
  });
}

function obGoalPage(){
  const inc = (data.incomeTemplates||[]).reduce((s,t)=>s+t.amount,0);
  const fixed = (data.templates||[]).reduce((s,t)=>s+t.amount,0);
  const available = Math.max(0, inc - fixed);
  const goal = data.settings.goal||0;
  const leftover = Math.max(0, available - goal);
  const pct = inc>0 ? Math.round((goal/inc)*100) : 0;
  const presets = [10,20,30].map(p=>{
    const v = Math.round(inc*p/100);
    const amtHtml = inc>0 ? '<br><span style="font-size:11px;color:var(--t3)">'+fmt(v)+'</span>' : '';
    return`<button class="ob-preset${goal===v?' sel':''}" data-val="${v}">${p}%${amtHtml}</button>`;
  }).join('');
  const maxGoal = Math.max(available, goal, 1000);
  return`<div style="flex:1;display:flex;flex-direction:column">
    <div class="ob-step-hdr" style="margin-bottom:16px">
      <div class="ob-step-eyebrow">Step 4 of 4</div>
      <div class="ob-step-title">Set a savings<br>goal</div>
      ${available>0?`<div class="ob-step-sub">You have ${fmt(available)} available after fixed costs.</div>`:'<div class="ob-step-sub">How much do you want to save each month?</div>'}
    </div>
    <div class="ob-goal-display">
      <div class="ob-goal-big" id="ob-goal-big">${fmt(goal)}</div>
      <div class="ob-goal-unit">per month${inc>0&&pct>0?' · '+pct+'% of income':''}</div>
    </div>
    <input type="range" class="ob-goal-slider" id="ob-goal-slider" min="0" max="${maxGoal}" step="10" value="${goal}">
    ${inc>0?`<div class="ob-goal-presets">${presets}</div>
    ${leftover>0?`<div style="font-size:13px;color:var(--t3);text-align:center;margin-top:12px">Leaves ~${fmt(leftover)} for variable spending (~${fmt(leftover/30)}/day)</div>`:''}`:``}
  </div>`;
}

function obWireGoal(){
  const slider = document.getElementById('ob-goal-slider');
  const bigNum = document.getElementById('ob-goal-big');
  const inc = (data.incomeTemplates||[]).reduce((s,t)=>s+t.amount,0);
  slider?.addEventListener('input', e=>{
    const v = +e.target.value;
    data.settings.goal = v;
    save();
    if(bigNum) bigNum.textContent = fmt(v);
    const pct = inc>0?Math.round((v/inc)*100):0;
    document.querySelector('.ob-goal-unit').textContent = 'per month'+(inc>0&&pct>0?' · '+pct+'% of income':'');
    document.querySelectorAll('.ob-preset').forEach(b=>b.classList.toggle('sel',+b.dataset.val===v));
  });
  document.querySelectorAll('.ob-preset').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const v = +btn.dataset.val;
      data.settings.goal = v;
      save();
      if(slider) slider.value = v;
      if(bigNum) bigNum.textContent = fmt(v);
      const pct = inc>0?Math.round((v/inc)*100):0;
      document.querySelector('.ob-goal-unit').textContent = 'per month'+(inc>0&&pct>0?' · '+pct+'% of income':'');
      document.querySelectorAll('.ob-preset').forEach(b=>b.classList.toggle('sel',+b.dataset.val===v));
    });
  });
}

function obDonePage(){
  const inc = (data.incomeTemplates||[]).reduce((s,t)=>s+t.amount,0);
  const fixed = (data.templates||[]).reduce((s,t)=>s+t.amount,0);
  const goal = data.settings.goal||0;
  const leftover = Math.max(0, inc-fixed-goal);
  return`<div class="ob-done" style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center">
    <div class="ob-done-icon">✦</div>
    <div class="ob-h1" style="font-size:30px">You're all set</div>
    <div class="ob-sub" style="margin-top:12px">Add variable expenses as they happen — FLOW handles the rest.</div>
    ${(inc>0||fixed>0||goal>0)?`<div class="ob-done-stats">
      ${inc>0?`<div class="ob-done-stat"><div class="ob-done-stat-val" style="color:var(--green)">${fmt(inc)}</div><div class="ob-done-stat-label">Monthly income</div></div>`:''}
      ${fixed>0?`<div class="ob-done-stat"><div class="ob-done-stat-val">-${fmt(fixed)}</div><div class="ob-done-stat-label">Fixed costs</div></div>`:''}
      ${goal>0?`<div class="ob-done-stat"><div class="ob-done-stat-val" style="color:var(--accent)">${fmt(goal)}</div><div class="ob-done-stat-label">Savings goal</div></div>`:''}
    </div>`:''}
  </div>`;
}

function obNext(){
  if(OB_STEPS[obStep]==='done'){ obFinish(); return; }
  obGo(obStep+1);
}
function obSkip(){
  if(OB_STEPS[obStep]==='done'){ obFinish(); return; }
  obGo(obStep+1);
}

// ─────────────────────────────────────────────────────────────────────────────
(function init(){
  if(!data.settings.budgets)data.settings.budgets={};
  if(!data.incomeTemplates)data.incomeTemplates=[];
  if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
  document.getElementById('prev-m').addEventListener('click',()=>{
    if(!obDone()){ obGo(obStep-1); return; }
    lastAnimState=null;state.month=prevK(state.month);render();
  });
  document.getElementById('next-m').addEventListener('click',()=>{
    if(!obDone()){ obGo(obStep+1); return; }
    lastAnimState=null;state.month=nextK(state.month);render();
  });
  document.getElementById('settings-btn').addEventListener('click',openSettings);
  document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{state.view=btn.dataset.view;render();}));
  document.getElementById('modal-save').addEventListener('click',saveModal);
  document.getElementById('modal-delete').addEventListener('click',deleteModal);
  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')closeModal();});
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      if(state.modal)closeModal();
      else if(document.getElementById('summary-overlay').classList.contains('open'))closeSummary();
      else if(document.getElementById('catdetail-overlay').classList.contains('open'))closeCatDetail();
    }
  });
  document.getElementById('summary-overlay').addEventListener('click',e=>{if(e.target.id==='summary-overlay')closeSummary();});
  document.getElementById('sum-close').addEventListener('click',closeSummary);
  document.getElementById('catdetail-overlay').addEventListener('click',e=>{if(e.target.id==='catdetail-overlay')closeCatDetail();});
  // Start onboarding or app
  if(obDone()){
    document.getElementById('onboarding').style.display='none';
    document.getElementById('app').style.display='flex';
    render();
  } else {
    obRender();
  }
})();
</script>
</body>
</html>
