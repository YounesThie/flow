<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#08081e"/>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#08081e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b8bff"/>
      <stop offset="100%" stop-color="#7B68EE"/>
    </linearGradient>
  </defs>
  <!-- F lettermark -->
  <text x="256" y="340" 
    font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
    font-size="280" font-weight="700" fill="url(#accent)"
    text-anchor="middle" letter-spacing="-8">F</text>
  <!-- subtle glow ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(123,104,238,0.15)" stroke-width="1"/>
</svg>